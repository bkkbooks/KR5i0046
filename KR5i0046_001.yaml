front:
  text: 金華宗旨金華宗旨辨言孝悌王云昔奉綸音命上真演化五陵之內渡拔多人今又遴選七人焉其與諸子所談無非盡性至命之學非若世人言性者不兼言命言命者或略於言性本體上復加工夫有工夫莫識本體以致失之毫釐謬以千里蓋言性直達先天言命不離沖漠性命合一體用兼該形色合天性以為用天性超形色以還元六根六塵皆為形色有形有色悉本天真離六塵無見性之地舍六根無立命之基識得六塵皆是本根則滴滴歸源矣見得六根皆光明藏則處處靈通矣是故有一物不歸性量畢竟見性之未真有一處不關命脈難言立命之己至學人本性命之學上達玉淸下徹泉壤法身周遍大千曲成萬物廣大悉備言性而命無不該言命而性無不具彼以龍虎法象煉形煉氣何為乎是書也本為七人宏願流傳萬劫有具出世福肩荷法門者虔奉修持何患不立致九霄而飛升紫府也許旌陽真君云天地設位聖人成能聖人亦人也何以成能於天地蓋自日月垂象四時運行百卉蕃昌人物變化參錯不齊愚人見其自無而之有莫不執有而滯於形至人則見其自有而返於無故皆觀象而歸於化所以數往者順知來者逆順則為人為物為山川巖谷為草木禽魚為風雨露雷為龍蛇怪異凡事變不可名狀者何易悉數逆則為佛為仙為威音為元始為贊化育之至聖為知化育之至誠甚矣一順一逆之間為人鬼異路聖凡分界本是同得之聖體而獨讓至人成能而與知與能之愚百姓日用之而不知返其本初亦甚可哀也己易日乾坤毁則無以見易人身一天地天地有日月萬象開明人身亦有日月故曰乾坤為易之門戶人有日月精華發露其猶重門洞開從此直登丹闕而上玉淸也抑何難哉要不外目前之利用出入愚百姓之易知簡能此至人普度心傳所以為無量歟張三丰祖師云道也者時焉而己日月往來寒暑遷變草木生長禽鳥飛鳴以及吾人日用動靜莫非運用一時之中變化無端時至自見斯為天地之心不可以一名而况於他乎我來也晚陽窮於上剝換盡矣兹當一陽初復倐然而來莫窮其迹莫究其因大地陽和己無不潛行而默運以為此天地之轉運也而天地不得而自主以為此日月之進退也而日月亦聽其自然風雲變易乎上草木萌動於下大矣哉時之為用也是故言道者不離目前即一言一動一事一物無不可以見天地之心蓋此天地之心任陰陽剝換時令推遷而無思無為終古寂然不動今人舍目前而談玄説妙則違乎時也違時即與道背馳何時而有見道之日乎天下之動貞於一動變不居何可言盡觀乎時而萬變皆在目前矣從目前一一消歸於大虛謂之見天地之心可謂之大道之宗旨可時也化也要不離乎目前而得之矣何道之可名何太乙之可言乎故曰道也者時焉而已通明上相邱長春祖師云昔隨侍呂祖與諸子標示宗旨如易從爻卦以前言太極也越數年許子深菴偕易菴滄菴輩又得大暢宗風如易言太極生兩儀兩儀生四象而四時行百物生天地日月山河鬼神同體合德無時無處而非宗旨之大全矣今何時乎大地冰堅草木黃落龍蛇蟄藏風日冥漠將以為萬物退藏而歸於寧閟乎乃朔風何自而來凍雲何自而起霜淸月落曉日迎暄鶴羽翩躚來尋法侶提起舊時公案一一如在目前往日舊遊又成故迹則當此玄冬亦任草木之凋殘風霜之變易而己何容心哉其聚其散孰往孰來聚而來其猶朔風憑虛而忽至散而往其若凍雲飄然而西馳聚者不可以為常散者豈終就於滅物情變化來往無端則自五行四時而太極而歸於無極也萬古一時寒暄一息有此刻之燭光日影霜花筆妙則為宗旨之現前為宗風之大暢為作序之大成舍此而言五行四時太極無極恐未免失之千里矣談長真真人云聖真無日不在世度人究竟何曾度得一人亦世人能自度耳若世人與聖真性量有增減分毫便是度不去聖祖初發願度生己度盡百千萬億劫無量衆生度此七人非七人也即七如來毗盧遮那無量法身也諸子不離凡夫地何以即與古佛同尊子輩原無信不及所以聖祖當下即度得去若有一毫信不及千生難免輪回也自古聖賢千言萬語無非要人識得此性光通天徹地古今聖凡一齊透過無少等待無不完成所謂盡性者盡此至命者至此採藥者採此修證者修證此而已此宗旨所以為萬法歸宗至尊法旨任爾為仙佛為人天為山河為六道為鬼怪為昆蟲草木無不承受法旨皈命大宗苟有萬分信得及者不離當下即與度去有一毫信不及饒他千生萬劫永墮迷途向立嚴誓七人外不得妄傳豈聖祖普度之公心只慮世人障蔽甚深罪業煩重不能開發信心而反生疑謗是益其罪也究竟聖祖度世之宏願與學人謹凛之畏心原無二無别知此不獨仰體祖訓先聖後聖殊途而一致矣王天君云善承受法旨護持道教千百年於此矣不惟派下賢嗣潛修默證呼吸感通即愚夫愚婦有能發一念向道真切者無不敬禮而左右維持之此固發願之初心如是亦一體感召虛空上下自無隔礙本來如是列祖諸真法身遍滿大千心心相卬法法歸宗往古來今超凡入聖者不離自本自根當下一齊正覺何果何因何修何證善也披誠宣力追隨恐後亦如風霆雷露隨時應化於覆載之中栽培傾覆一任萬類之各正性命而已而造物者無心也自七賢之敬受宗旨斯地遂為選佛道場十方三世一時會集百靈呵護日月開明有情無情盡成法侣上天下地悉與證盟道祖設教以來真未有若此廣大悉備易簡直截如宗旨之盡泄玄機者是日受命鑒證盟誓善敬辭曰無庸有此證也以七人得遇聖真傳示無上妙道即傭夫爨媪牧豎樵童疇非聽法之上器甚至魔神蛟黨龍蛇異類亦無不在此證盟之內七人何藉于余余又何必為七人證呂祖再三申命曰天不愛道傳示七人將由此七人化度無量有誹謗法門詆毁賢聖惟爾護法呵譴而默相之法子有不敬愼凛遵戒律或輕授匪人爾護法亦嚴加譴罰善同七人跪而受命嗚呼列祖普度慈悲原無分上下其奈世人積業如山無自仰承法雨七人果能體此化度慈心隨地隨時多方接引無負自度度人之宏願則盡法界衆生皆投誠歸命亦何待雷露風霆惟是廣生大生以各正性命于兩間可耳金華宗旨自序集易大傳曰神無方也無體也言神無方體則名言之而難盡矣往來不窮利用出入日用之而不知與天地合其德與日月合其明與鬼神同其變化至矣哉盛德大業言之不可終窮擬議之而無可形似靈文祕笈俱歸塵腐豫之定是宗旨不落名言無從擬議其所以斡旋天地轉運陰陽者在握其寸機而已得其機則妙用在我而乾坤皆範圍之而不過矣機者何一而已一不可名歸之太虛而浩浩落落一片神行其間變化無端妙用不測吾何以名之曰太乙噫至矣盡矣宇菴屠子輩編輯宗旨成書各授弟子為之闡發大意而著之簡端是為序重刋道藏輯要
