  text: 金華宗旨重刋道藏輯要
  hash: sha256:d0adbbdda39caa05f8faf116e7e779267a84a7e6de01039ea4aae3a4d699fd19
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0046_02p001a}
body:
  text: 金華宗旨孚佑上帝純陽呂祖天師著天心第一呂祖曰自然曰道道無名相一性而已一元神而己性命不可見寄之天光天光不可見寄之兩目古來仙真皆口口相傳傳一得一自太上化現東華遞傳巖以及南北兩宗全真可為極盛盛者盛其徒衆衰者衰於心傳以至今日泛濫極矣凌替極矣極則返故昔日有許祖垂慈普度特立教外别傳之旨聞者千劫難逢受者一時法會皆當仰體許祖心先於人倫日用間立定腳跟方可修真悟性我奉敕為度師今以太乙金華宗旨發明然後細為開説太乙者無上之謂丹訣甚多總假有為而臻無為非一超直入之旨我傳宗旨直提性功不落第二法門所以為妙金華即光也光是何色取象於金華亦祕一光字在內是天仙太乙之真氣水鄉鉛只一味者此也回光之功全用逆法方寸中具有鬱羅蕭臺之勝玉京丹闕之奇乃至虛至靈之神所注儒曰虛中釋曰靈臺道曰祖土曰黃庭曰玄關曰先天竅蓋天心猶宅舍一般光乃主人翁也故一回光則周身之氣皆上朝諸子只去回光便是無上妙諦光易動而難定回之既久此光凝結即是自然法身而凝神於九霄之上矣心印經所謂默朝飛升者此也金華即金丹神明變化各師於心元神識神第二呂帝曰天地視人如蜉蝣大道視天地亦泡影惟元神真性則超元會而上之其精氣則隨天地而敗壞矣然有元神在即無極也生天生地皆由此矣學人但能護元神則超生在陰陽外不在三界中此見性方可所謂本來面目是也最妙者光己凝結為法身漸漸靈通欲動矣此千古不傳之祕也識心如強藩悍將遙執紀綱久之太阿倒置矣今凝守元宮回光返照如英主在上大臣輔弼內政既肅自然強悍懾伏矣丹道以精水神火意土三者為無上之訣精水云何乃先天真一之氣神火即光也意土即中宮天心也以神火為用意土為體精水為基凡人以意生身身不止七尺者為身也蓋身中有魄焉魄附識而用識依魄而生魄陰也識之體也識不斷則生生世世魄之變形易質無己也惟有魂神之所藏也魂晝寓于目夜舍于肝寓目而視舍肝而夢夢者神遊也九天九地剎那厯遍覺則冥冥焉淵淵焉拘于形也即拘於魄也故回光所以煉魂即所以保神即所以制魄即所以斷識古人出世法煉盡陰滓以返純乾不過消魄全魂耳回光者消陰制魄之訣也無返乾之功止有回光之訣光即乾也回之即返之也只守此法自然精水充足神火發生意土凝定而聖胎可結矣𧏙螂轉丸而丸中生白神注之純功也糞丸中尚可生胎離殼而吾天心休息處注神於此安得不生身乎一靈真性既落乾宮便分魂魄魂在天心陽也輕淸之氣也此自太虛得來與元始同形魄陰也沈濁之氣也附于有形之凡心魂好生魄望死一切好色動氣皆魄之所為即識也死後享血食活則大苦陰返陰也以類聚也學人煉盡陰魄即為純陽回光守中第三呂帝曰回光之名何昉乎昉之自文始真人也即關尹子光回則天地陰陽之氣無不凝所云精思者此也純氣者此也純想者此也初行此訣是有中似無久之功成身外有身乃無中似有百日專功光才真方為神火百日後光自然一點真陽忽生沈珠如夫婦交合有胎便當靜以待之光之回即火候也夫元化之中有陽光為主宰有形者為日在人為目走漏神識莫此甚順也故金華之道全用逆法回光者非回一身之精華直回造化之真氣非止一時之妄想真空千劫之輪回故一息當一年人間時刻也一息當百年九途長夜也凡人自㘞戶臥切音和地一聲之後逐境順生至老未嘗逆視陽氣衰滅便是九幽之界故楞嚴經云純想即飛純情即墮學人想少情多沈淪下道惟諦觀息靜便成正覺用逆法也陰符經云機在目黃帝素問云人身精華皆上注於空竅是也得此一節長生者在兹超生者亦在兹矣此貫徹三教工夫也光不在身中亦不在身外山河日月大地無非此光故不獨在身中聰明智慧一切運轉亦無非此光所以亦不在身外天地之光華布滿大千一身之光華亦自漫天蓋地所以一回光大地山河一切皆回矣人之精華上注於目此人身之大關鍵也子輩思之一日不靜坐此光流轉何所底止若一刻能靜坐萬劫千生從此了徹萬法歸於靜真不可思議此妙諦也然工夫下手由淺入深由粗入細總以不間斷為妙工夫始終則一但其間冷暖自知要歸於天空地濶萬法如如方為得手聖聖相傳不離反照孔云致知釋號觀心老云內觀皆己括盡要旨其餘入靜出靜前後以小止觀書印證可也緣中二字妙極中無不在遍大千皆在裏許聊指造化之機緣此入門耳緣者緣此為端倪非有定著也此一字之義活甚妙甚止觀二字原離不得即定慧也以後凡念起時不要仍舊兀坐當究此念在何處從何起從何滅反覆推窮了不可得即見此念起處也不要又討過起處覓心了不可得吾與汝安心竟此是正觀反此者名為邪觀如是不可得己即仍舊綿綿去止而繼之以觀觀而繼之以止是定慧雙修此為回光回者止也光者觀也止而不觀名為有回無光觀而不止名為有光無回志之回光調息第四呂帝曰宗旨只要純心行去不求驗而驗自至大約初機病痛昏沈散亂二種盡之郤此有機竅無過寄心於息息者自心也自心為息心一動而即有氣氣本心之化也吾人念至速霎頃一妄念即一呼吸應之故內呼吸與外呼吸如聲響之相隨一日有幾萬息即有幾萬妄念神明漏盡如木稿灰死矣然則欲無念乎不能無念也欲無息乎不能無息也莫若即其病而為藥則心息相依是己故回光必兼之調息此法全用耳光一是目光一是耳光目光者外日月交光也耳光者內日月交精也然精即光之凝定處同出而異名也故聰明總一靈光而己坐時用目垂簾後定箇準則便放下然竟放又恐不能即存心於聽息息之出入不可使耳聞聽惟聽其無聲一有聲即粗浮而不入細即耐心輕輕微微些愈放愈微愈微愈靜久之忽然微者遽斷此則真息現前而心體可識矣蓋心細則息細心一則動氣也息細則心細氣一則動心也定心必先之養氣者亦以心無處入手故緣氣為之端倪所謂純氣之守也子輩不明動字動者以線索牽動言即制字之别名也既可以奔趨使之動獨不可以純靜使之寧乎此大聖人視心氣之交而善立方便以惠後人也丹書云雞能抱卵心常聽此要妙訣也蓋雞之所以能生卵者以暖氣也暖氣止能溫其殼不能入其中則以心引氣入其聽也一心注焉心入則氣入得暖氣而生矣故母雞雖有時出外而常作側耳勢其神之所注未嘗少間也神之所注未嘗少間即暖氣亦晝夜無間而神活矣神活者由其心之先死也人能死心元神即活死心非枯稿之謂乃專一不分之謂也佛云置心一處無事不辦心易走即以氣純之氣易粗即以心細之如此而心焉有不定者乎大約昏沈散亂二病只要靜功日日無間自有大休息處若不靜坐時雖有散亂亦不自知既知散亂即是卻散亂之機也昏沈而不知與昏沈而知相去奚啻千里不知之昏沈真昏沈也知之昏沈非全昏沈也淸明在是矣散亂者神馳也昏沉者神未淸也散亂易治昏沉難醫譬之病焉有痛有癢者藥之可也昏沉則麻木不仁之症也散者可以收之亂者可以整之若昏沉則蠢蠢焉冥冥焉散亂尚有方所至昏沉全是魄用事也散亂尚有魄在至昏沉則純陰為主矣靜坐時欲睡去便是昏沉卻昏沉只在調息息即口鼻出入之息雖非真息而真息之出入亦於此寄焉凡坐須要靜心純氣心何以靜用在息上息之出入惟心自知不可使耳聞不聞則細細則淸聞則氣粗粗則濁濁則昏沉而欲睡自然之理也雖然心用在息上又要善會用亦是不用之用只要微微照聽可耳此句有微意何謂照即眼光自照目惟內視而不外視不外視而惺然者即內視也非實有內視何謂聽即耳光自聽耳惟內聽而不外聽不外聽而惺然者即內聽也非實有內聽聽者聽其無聲視者視其無形目不外視耳不外聽則閉而欲內馳惟內視內聽則則不外走既不外走又不內馳而中不昏沉矣此即日月交精交光也昏沉欲睡即起散步神淸再坐淸晨有暇坐一炷香為妙過午人事多擾易落昏沉然亦不必限定一炷香只要諸緣放下靜坐片時久久便有入頭不落昏睡矣回光差謬第五呂帝曰諸子工夫漸漸純熟然枯木岩前錯落多正要細細開示此中消息身到方知吾今則可以言矣吾宗與禪學不同有一步一步徵驗請先言其差别處然後再言徵驗宗旨將行之際預作方便勿多用心放教活潑潑地令氣和心適然後入靜靜時正要得機得竅不可坐在無事甲裏所謂無記空也萬緣放下之中惺惺自若也又不可意興承當凡太認真即易有此非言不宜認真但真消息在若存若亡之間以有意無意得之可也惺惺不昧之中放下自若也又不可墮于藴界所謂藴界者乃五陰魔用事如一般入定而稿木死灰之意多大地陽春之意少此則落陰界其氣冷其息沈且有許多寒衰景象久之便墮木石又不可隨于萬緣如一入靜而無端衆緒忽至欲卻之不能隨之反覺順適此名主為奴役久之落于色欲界差路既知然後可求證驗回光證驗第六呂帝曰證驗亦多不可以小根小器承當必思度盡衆生不可以輕心慢心承當必須請事斯語靜中綿綿無間神情悅豫如醉如浴此為遍體陽和金華乍吐也既而萬籟俱寂皓月中天覺大地俱是光明境界此為心體開明金華正放也既而遍體充實不畏風霜人當之興味索然者我遇之精神更旺黃金起屋白玉為臺世間腐朽之物我以真氣呵之立生紅血為乳七尺肉團無非金寶此則金華大凝也第一段是應觀經日落大水行樹法象日落者從混沌立基無極也上善若水淸而無瑕此即太極主宰出震之帝也震為木故以行樹象焉七重行樹七竅光明也西方乾方移一位為坎日落大水乾坎之象也坎為子方冬至雷在地中隱隱隆隆至震而陽出地上矣行樹之象也餘可類椎第二段即肇基于此大地為氷琉璃寶地光明漸漸凝矣所以有蓬臺而繼之佛也金性既現非佛而何佛者大覺金仙也此大段證驗耳現在可考證驗有三一則坐去神入谷中聞人説話如隔里許一一明了而聲入皆如谷中答響未嘗不聞我未嘗一聞此為神在谷中隨時可以自驗一則靜中目光騰騰滿前皆白如在雲中開眼覓身無從覓視此為虛室生白內外通明吉祥止止也一則靜中肉身絪緼如綿如玉坐中若留不住而騰騰上浮此為神歸頂天久之上升可以久待此三者皆現在可驗者也然亦是説不盡的隨人根器各現殊勝如止觀中所云善根發相是也此事如人飲水冷暖自知須自已信得過方真先天一氣即在現前證驗中自討一氣若得丹亦立成此一粒真黍也一粒復一粒從微而至著有時時之先天一粒是也有統體之先天一粒乃至無量也一粒有一粒力量此要自家膽大為第一義回光活法第七呂帝曰回光循循然行去不要廢棄正業古人云事來要應過物來要識過子以正念治事即光不為物轉即回此時時無相之回光也可日用間能刻刻隨事返照不著一毫人我相便是隨地回光此第一妙用淸晨能遣盡諸緣靜坐一二時最妙凡應事接物只用返身法便無一刻間斷如此行之三月兩月天上諸真必來印證矣逍遙訣第八呂帝曰玉淸留下逍遙訣四字凝神入氣穴六月俄看白雪飛三更又見日輪赫水中吹起藉巽風天上遊歸食坤德更有一句玄中玄無何有鄉是真宅律詩一首玄奧已盡大道之要不外無為而為四字惟無為故不滯方所形象惟無為而為故不墮頑空死虛作用不外一中而樞機全在二目二目者斗柄也斡旋造化轉運陰陽其大藥則始終一水中金即水鄉鉛而已前言回光乃指點初機從外以制內即輔以得主此為中下之士修下二關以透上一關者也今頭路漸明機括漸熟天不愛道直泄無上宗旨諸子祕之祕之勉之勉之夫回光其總名耳工夫進一層則光華盛一番回法更妙一番前者由外制內今則居中御外前者即輔相主今則奉主宣猷面目一大顚倒矣法子欲入靜先調攝身心自在安和放下萬緣一不挂天心正位乎中然後兩目垂簾內照坎宮光華所到真陽即出以應之離外陽而內陰乾體也一陰入內而為主隨物生心順出流轉今回光內照不隨物生陰氣即住而光華注照則純陽也同類必親故坎陽上騰非坎陽也仍是乾陽應乾陽耳二物一遇便紐結不散絪緼活動倏來倏往倏浮倏沈自已元宮中恍如太虛無量遍身輕妙欲騰所謂雲滿千山也次則來往無蹤浮沈無辨脈住氣停此則真交媾矣所謂月涵萬水也俟其杳冥中忽然天心一動此則一陽來復活子時也然而此中消息要細説凡人一聽耳目逐物而動物去則己此之動靜全是民庶而天君反隨之役是常與鬼居矣今則一動一靜皆與人居天君乃真人也彼動即與之俱動動則天根靜即與之俱靜靜則月窟動靜無端亦與之為動靜無端休息上下亦與之為休息上下所謂天根月窟間來往也天心鎮靜動違其時則失之嫩天心已動而後動以應之則失之老天心一動即以真意上升乾宮而神光視頂為導引焉此動而應時者也天心既升乾頂遊揚自得忽而欲寂急以真意引入黃庭而目光視中黃神室焉既而欲寂者一念不生矣視內者忽忘其視矣爾時身心便當一場大放萬緣泯迹即我之神室爐鼎亦不知在何所欲覓已身了不可得此為天入地中衆妙歸根之時也即此便是凝神入氣穴夫一回光也始而散者欲斂六用不行此為涵養本源添油接命也既而斂者自然優遊不費纖毫之力此為安神祖竅翕聚先天也既而影響俱滅寂然大定此為蟄藏氣穴衆妙歸根也一節中具有三節一節中且有九節且俟後日發揮今以一節中具三節言之當其涵養而初靜也翕聚亦為涵養蟄藏亦為涵養至後而涵養皆蟄藏矣中一層可類推不易處而處分焉此為無形之竅千處萬處一處也不易時而時分焉此為無候之時元會運世一刻也凡心非靜極則不能動動動妄動非本體之動也故曰感於物而動性之欲也若不感於物而動即天之動也不以天之動對天之性句落下説箇欲字欲在有物也此為出位之思動而有動矣一念不起則正念乃生此為真意寂然大定中而天機忽動非無意之意乎無為而為即此意詩首二句全括金華作用次二句是日月互體意六月即離火也白雪飛即離中真陰將返乎坤也三更即坎水也日輪即坎中一陽將赫然而返乎乾也取坎填離即在此中次二句説斗柄作用升降全機水中非坎乎目為巽風目光照入坎宮攝召太陽之精是也天上即乾宮遊歸食坤德即神入氣中天入地中養火也末二句是指出訣中之訣訣中之訣始終離不得所謂洗心滌慮為沐浴也聖學以知止始以止至善終始乎無極歸乎無極佛以無住而生心為一大藏教旨吾道以致虛二字完性命全功總之三教不過一句為出死護生之神丹神丹維何曰一切處無心而已吾道最祕者沐浴如此一部全功不過心空二字足以了之今一言指破省卻數十年參訪矣子輩不明一節中具三節我以佛家空假中三觀為喻三觀先空看一切物皆空次假雖知其空然不毁萬物仍於空中建立一切事既不毁萬物而又不著萬物此為中觀當其修空觀時亦知萬物不可毁而又不著此兼三觀也然畢竟以看得空為得力故修空觀則空固空假亦空中亦空修假觀是用上得力居多則假固假空亦假中亦假中道時亦作空想然不名為空而名為中矣亦作假觀然不名為假而名為中矣至於中則不必言矣吾雖有時單説離有時兼説坎究竟不曾移動一句開口提云樞機全在二目所謂樞機者用也用此斡旋造化非言造化止此也六根七竅悉是光明藏豈取二目而他槩不問乎用坎陽仍用離光照攝即此便明日月原是一物其日中之暗處是真月之精月窟不在月而在日所謂月之窟也不然只言月足矣月中之白處是真日之光日光反在月中所謂天之根也不然只言天足矣一日一月分開止是半箇合來方成一箇全體如一夫一婦獨居不成家室有夫有婦方算得一家完全然而物難喻道夫婦分開不失為兩人日月分開不成全體矣吾言只透露其相通處所以不見有兩子輩專執其隔處所以隨處換卻眼睛百日立基第九呂帝曰心印經云回風混合百日功靈總之立基百日方有真光如子輩尚是目光非神火也非性光也非慧智炬燭也回之百日則精氣自足真陽自生水中自有真火以此持行自然交媾自然結胎吾方在不識不知之天而嬰兒以成矣若略作意見便是外道百日立基非百日也一日立基非一日也一息立基非呼吸之謂也息者自心也自心為息元神也元氣也元精也升降離合悉從心起有無虛實咸在念中一息一生持何止百日然百日亦一息也百日只在得力晝中得力夜中受用夜中得力晝中受用百日立基玉旨耳上真言語無不與人身應真師言語無不與學人應此是玄中之玄不可解者也見性乃知所以學人必求真師授記任性發出一一皆驗性光識光第十呂帝曰回光法原通行住坐臥只要自得機竅吾前開示云虛室生白光非白耶但有一説初未見光時此為效驗若見為光而有意著之即落意識非性光也子不管他有光無光只要無念生念何謂無念千休千處得何謂生念一念一生持此念乃正念與平日念不同今心為念念者現在心也此心即光即藥凡人視物任眼一照去不及分別此為性光如鏡之無心而照也如水之無心而鑑也少頃即為識光以其分別也鏡有影已無鏡矣水有象已非水矣光有識尚何光哉子輩初則性光轉念則識識起而光杳不可覓非無光也光已為識矣黃帝曰聲動不生聲而生響即此義也楞嚴推勘入門曰不在塵不在識惟選根此則何意塵是外物所謂器界也與吾了不相涉逐之則認物為已物必有還通還戶牖明還日月借他為自終非吾有至於不汝還者非汝而誰明還日月見日月之明無還也天有無日月之時人無有無見日月之性若然則分別日月者還可與為吾有耶不知因明暗而分別者當明暗兩忘之時分別何在故亦有還此為內塵也惟見性無還見見之時見非是見則見性亦還矣還者還其識流轉之見性即阿難使汝流轉心目為咎也初八還辨見時上七者皆明其一一有還姑留見性以為阿難拄杖究竟見性既帶八識非真不還也最後并此一破則方為真見性真不還矣子輩回光正回其最初不還之光故一毫識念用不著使汝流轉者惟此六根使汝成菩提者亦惟此六根而塵與識皆不用非用根也用其根中之性耳今不墮識回光則用根中之元性落識而回光則用根中之識性毫釐之辨在此也用心即為識光放下乃為性光毫釐千里不可不辨識不斷則神不生心不空則丹不結心淨則丹心空即藥不著一物是名心淨不留一物是名心空空見為空空猶未空空忘其空斯名真空坎離交媾第十一呂帝曰凡漏泄精神動而交物者皆離也凡收轉神識靜而中涵者皆坎也七竅之外走者為離七竅之內返者為坎一陰主於逐色隨聲一陽主於返聞收見坎離即陰陽陰陽即性命性命即身心身心即神氣一自斂息精神不為境緣流轉即是真交而沈默趺坐時又無論矣周天第十二呂帝曰周天非以氣作主以心到為妙訣若畢竟如何周天是助長也無心而守無意而行仰觀乎天三百六十五度刻刻變遷而斗柄終古不動吾心亦猶是也心即璇璣氣即羣星吾身之氣四肢百骸原是貫通不要十分著力於此鍛鍊識神斷除妄見然後藥生藥非有形之物此性光也而即先天之真氣然必於大定後方見並無採法言採者大謬矣見之既久心地光明自然心空漏盡解脫塵海若今日龍虎明日水火終成妄想去吾昔受火龍真人口訣如是不知丹書所説更何如也一日有一周天一刻有一周天坎離交處便是一周我之交即天之迥旋也未能當下休歇所以有交之時即有不交之時然天之迥旋未嘗少息果能陰陽交泰大地陽和我之中宮正位萬物一時暢遂即丹經沐浴法也非大周天而何此中火候實實有大小不同究竟無大小可別到得功夫自然不知坎離為何物天地為何等孰為交孰為一周兩周何處覓大小之分別耶總之一身旋運雖見得極大亦小若一迥旋天地萬物悉與之迥旋即在方寸處亦為極大金丹火候要歸自然不自然天地自還天地萬物各歸萬物欲強之使合終不能合即如天時亢旱陰陽不合乾坤未嘗一日不周然終見得有多少不自然處我能轉運陰陽調適自然一時雲蒸雨降草木酣適山河流暢縱有乖戾亦覺頓釋此即大周天也子等問活子時甚妙然必認定正子時似著相不著相不指明正子時何從而識活子時既識得活子時確然又有正子時是一是二非正非活總要人看得真一真則無不正無不活矣見得不真何者為活何者為正耶即如活子時是時時見得的畢竟到正子時志氣淸明活子時愈覺發現人未識得活的明了只向正的時候驗取則正者現前活者無不神妙矣勸世歌第十三呂帝曰吾因度世丹衷熱不惜婆心並饒舌世尊亦為大因緣直指生死真可惜老君也患有吾身傳示谷神人不識吾今略説尋真路黃中通理載大易正位居體是玄關子午中間堪定息光回祖竅萬神安藥産川源一氣出透幕變化有金光一輪紅日常赫赫世人錯認坎離精搬運心腎成間隔如何人道合天心天若符兮道自合放下萬緣毫不起此是先天真無極太虛穆穆朕兆捐性命關頭忘意識意識忘後見本真水淸珠現玄難測無始煩障一旦空玉京降下九龍册步霄漢兮登天關掌風霆兮驅霹𩆝凝神定息是初機退藏密地為常寂吾昔度張珍奴二詞皆有大道子後午前非時也坎離耳定息者息息歸根中黃也坐者心不動也夾脊者非背上輪子乃直透玉京大路也雙關者此處有難言者地雷震動山頭者真氣生也黃芽出土者藥生也小小二段已盡修行大路明此可不惑人言回光在純心行去只將真息凝照于中宫久之自然通靈達變也總是心靜氣定為基心忘氣凝為效氣息心空為丹成心氣渾一為溫養明心見性為了道子輩各宜勉力行去錯過光陰可惜也一日不行一日即鬼也一息行此一息真仙也勉之謹按此經乃性命兼修天仙之的傳也道旨真宗得茲明曉更藉問答切實指點誠覺世微妙心燈夫大千沙界遍地金華宗旨能明盡人得證今幸我孚佑帝師大布慈悲普施法力將天仙妙道於此處拈出從茲日麗中天垂之萬古矣所期月臨大地印乎千潭耳宗正本係仍屠子之舊今就宗正本詳為釐定歸入集中以質後之天仙嗣派者廣化弟子惠覺謹志金華宗旨闡幽問答問先天之學心也後天之學迹也欲免輪回須從無形做工夫答曰無從做工夫究竟何以做將謂靜中可得動則失不知動之所以失由靜之無以得夫靜無得動有失皆未達道也汝所云形而上止言其當然未識其所以然刻下惟于有迹探無迹有迹而無迹迷者千里悟者一朝又問如何是有迹探無迹答曰空嗟男子學嬋娟妙裏尋芳總一偏不識正中中又正無端起處是真玄問如何心得靜答曰事事物物窮之難時時刻刻存之易存者存其心心存方有主有主方能治事夫一操一舍之間天人之分賢愚之别未可輕視也但存心易于斷續行之久自無間無間則續續則光明光明則氣充氣充則昏散不除而除矣噫嘻天下事惟此事大餘皆末焉耳百忙中寸存萬事中一理不體此二語終難入於聖域問觀心答曰觀心淸淨心本無二止一精真通前徹後無他不離見聞緣超然登佛地然觀心亦有深淺有強觀有自然觀有塵外觀有塵內觀有不內外觀有普觀爾將何觀觀心乎吾道一步一步亦不躐等而參之終始地位亦不外此起手即是落手從觀起手功夫也觀深妄淨方是真空若止言空理而不假觀行則是口頭禪凡夫終是凡夫何為修也問回光返照答曰不照何以見非筏莫渡非非法莫渡渡即是渡筏終是筏見筏無筏知渡非渡迥光不以目而以心心即是目久久神凝方見心目朗然不證者難言此反啓著相之斃不證由於精虛且觀心覺竅以生其精精稍凝即露即見玄關竅妙參悟工夫方有著落不然是渺茫之言言之亦覺自愧欺人吁大道幽深實難言一步一步到花妍花中有實卻無實即是凡夫超後天無有廣大靈慧千萬裊娜法座寬深説法無際且待爾等造就日積月纍心開見佛方知龍眠深處不吾欺也至于眼觀臍下是外功內功心目生才是真丹田左轉右轉其理本同丹經云自然之所為兮非有邪偽道又有眼前見光者鼠光也非虎眼非龍精之光心光不屬內外若色目望見即為魔矣汝等污染久之一時難淸其實生死事大一念回光收復精神凝照自心即是佛燈滿屋財氣只在各人認真不認真看吸得多少我此事神鬼俱驚惟有德者當之何謂佛燈常令燭照即是佛燈與其屋內屋外點燈供我不若此一盞燈徹夜不昧照徹五藴皆空方知救苦救難一尊觀世音心燈一盞人人本有只要點得明便是長生不死大仙人汝等勿要忘了此心使神昏昧無主則精神散漫此法直揭大乘宗旨一超直入工夫回光者即他日身後明白境不獨現在也必須逼我説出來汝等才發信心亦大泄天機矣汝照此行去不期效而自效平生參學方貫串得來不是今日東明日又西説些野狐禪便為了事問如何才謂之上菩提路才為到家答曰本未離家只因自心迷惑指南為北以致有千程萬途之跋涉其實只在當下拾得衣中珠仍是自已珍一念回光即是在那菩提路上家園切近上好叢林不用出家即此是蘭若我此法心傳卻是一超直入工夫謂之保本修行力聚者開宏光天化日也不為希罕即力淺根劣亦不失小仙小神身分諸子領之問從性學入手否答曰性學非命學不了先從性探引命之作命通方得徹性性非命不徹命非性不了故易云窮理盡性以至於命盡性罷了又何以至於命不得窮到底焉知神物隱於此可以生人可以殺人生殺只在這箇並非另有玄關又問守真如之性可乎答曰真如之性怎能守得既曰如是活活如如何容擬議擬議尚不能焉能守之不守而守無可守也守則把持真如不現莫把捉四大本空五陰非有何處容汝撈摸問致心一處答曰致心一處固然然心無定處又須活潑善探不在形色形色俱是後天知者心之用空寂者心之體若著在後天則是氣質用事理之不盡了之不能矣又問若不致心一處如何得主張答曰超動靜得主張無主張卻是主張莫荒唐飄飄蕩蕩雷雨風雲現樣造化齊彰活活潑潑不是尋常卻是尋常天花亂墜諸神獻瑞實堪慶快平生一了百當舉目神光大法場結果一齊光説甚愰朗莫把捉仔細詳把捉則愈馳愈遠止有火熾而無水養水火不均平焉得神丹長道人總是徹骨談毫無誣強爾等善體大道在望實不待來生再了轉瞬大光明照徹五藴皆空彌綸世界如掌問神入氣中答曰如何入神不入氣中無不在耳所謂神入氣中者後天之神耳非先天之神途路入門功夫氣中即心中要仔細認即玄關之啓處也若著力則鑿非玄關之啓處周身之氣也大有危險不可不知玄關乃天地之正中竅中有竅亦無可指之處若有可指則是造化五行中焉是出造化事玄學不落造化卻有造化非身體力行自證者不能語語金針句句入彀默會而已不在多言問神氣答曰神無質神即氣也神氣不能分離氣則神無所立亦無所為氣矣氣運即是神運又問神氣既不能分道家又何云鍊氣化神答曰存淸去濁之謂惟淸故靈神即氣之淸者也若鍊神還虛虛非氣乎氣即神神行乎氣又謂反其所由生問以氣感氣答曰以氣感氣固然若指人身中氣真凡而不可用矣何時超升仙佛不是如此沖虛之氣摸不著點點心兒索至於運氣小術亦可栽培肉身以延其夀若以為大道必須肉身上做工夫則是旁門之言沾著些須不是他要從無沾依中幻化為用不是這般説法卻是那邊行履光明法界何處容情佛語亦中聽仙家奏樂音可惜人不懂缺少箇知音總之外功於大道無涉大道真修先要精化氣此精不是交感精丹書內已厯厯言之這一層先難講何況二關事三關事更難説大道幽深實非戲語有人説到入路便以為究竟極則不知出路若何出而復入又若何問修持答曰修者去其汚染也無汚染有何修持若再修持頭上安頭問從何體認答曰體認者認體也心體無形體認即是工夫體認一分積得一分積厚流光道在眼前矣汝仍從用探體去到得體現方有妙用妙用顯體人不知之問三才立極如何是人極答曰人極在心即天心也在人曰人在天曰天上帝臨汝無二爾心本心通天即通上帝一念感召位入仙班矣汝等無學愧吾未教吾將所藏細為汝道道其所道曰太極太極之理貫徹天人天本乎此而立陰陽之極生生不息之機實肇於此人有是理而為私所蔽故不顯其理止存其質動靜之間偏側莫曉昏昏乎嵗月忽忽乎流行放蕩無忌瞥而不返吁嗟乎紅光一透瓦解冰消莫知其所之也所謂士希賢賢希聖歸而返之由於致知致知之要存乎一心心純篤則日進而不已心惡雜則流蕩而不息嗟嗟二三子侍吾久矣未敢直透其旨蓋靜敬者寡誠一者鮮所謂道不虛行耳風雨閙人事逍遙説玄機大半是空中實到不積德沒倚靠故將人事作梯航做得了時機宜到做不了時也有紅塵誥天地無私何須人計巧汝等有事亦不妨只要精神不散漫如猛火聚爐方有專一之意方可入菩提路而證涅槃不然者渺茫其説昏默其旨不識自己性命根源端的焉有進步問一切細參功夫須要尋常而切已答曰有何工夫不行而密不肅而敬篤恭以持已顯晦合一體用無殊工夫何在而何不在所謂大道以默以柔無時而不適無事而不泰然問某止知靜其體也動其用也顯其著也晦其隱也歧而二之莫能合而一之前蒙示顯晦合一體用無殊是就無形者而言答曰有形中無形中無有形中亦無無形中中中一內察其體用之無殊求其隱顯之莫測問蒙示不行而密不肅而敬工夫何在何不在即是顯晦合一體用無殊若就流行者言分明是有動有靜豈以動靜皆天然而無欲謂之合一無殊抑以紛紜萬變皆莫能逃於太虛中謂之合一無殊耶答曰水之有波波非水耶因其外動而內以含內靜而波之波水之水也如是而已矣藏於中形於外烏得不謂之合一不謂之無殊乎問存心以致其知答曰有何存又問知致而鏡明鏡明而垢見纖翳無所容所謂明得盡渣滓便渾化了也答曰其養也其賊也畢於是矣究其中無一箇主宰如日月往來寒暑定歲四時代謝八節興衰齊之此中始成歲功而運行無滯命之所由立也性之寓亦在是矣爾其焚香靜驗久而有得江湖泊久雲蔽西山知日出是其時矣問兢業者即是本體本體本自兢業合著本體即是工夫所謂不行而密不肅而敬也自其精明而言謂之知自其鑒察而言謂之敬自其無妄而言謂之誠自其生理具於此謂之仁自其無內外可分無動靜可別無極太極謂之一篤恭而天下平中也者和也言中而和在其中矣言和而中不待言矣動無不和即靜無不中表裏一貫頭正尾直答曰常言之常行之庸言庸行至誠無妄三家至祕無多語問昨言鏡明垢現蒙示其養也其賊也是否涵養省察因此嗜欲紛華亦因此即是識精未經點化之陰神釋家之所謂種性是也答曰將疑焉將信焉明明白白一箇大路到其際自前進矣久而自化種性為佛性問尋根即可透悟否答曰尋根覔底到海邊有箇夜乂現陰極方能生陽未到窮陰難透其源從根探摸正不著空不著有之妙法耳此吾之異傳在此通天徹地大道快活陽神普大千一口吸盡水江西獅子奮迅才出窟萬獸齊驚聲希咄小道旁門焉足一聞吾語汝將肉身全莫講照此再從心源探即是坎府求玄水底蛟龍出現未探水不窮源總是皮膚又皮膚逢人説學道止不過徒博虛名所謂挂榜修行吾門大忌如此參要真參悟要實悟通天徹地盡是法身俱是我性光現問坎離答曰即先天之所化不是有為亦非無語只此一言半句玄能會者即得證真常不會者終歸無用即如作事必得中人要須中用事方有成不然間隔東西木三金四那得究裏此乃切骨之談母忽問念慮紛雜一念未止一念續之如魚之吸水口進腮出如夏日之令晝長夜短則於玄牝竅妙尚不得著眼而觀何望真機之闔闢如練如綿答曰心地光明今古燭何云玄牝沒根源功夫久久成妙矚陰陽全識是機先問天地非日月不顯日月退藏則天地混沌神與氣合氣結神凝是否即坎離交答曰坎離交於不知不覺之地而運行未嘗稍息焉天之道無時不轉移妙在不期而合非有心為之生死固在天天其有心乎問坎離交在內由此而大藥産一點元性微明藏在坤腹光透簾幃純淸絶塵息住氣寧止存空明是謂天地心主持萬化答曰氣寧息住機之復生之理所以活潑即俗云活子時也又問自此從微至著應乾卦三陽三陽退處即是三陰是謂小周天重入胞胎性歸於命蓄久發暴烈火飛騰此是火躁恐啓後天情識故吸閉以防危使之下降而無生撮舐以助火使之上升淸虛而無減謂之大交匹配真汞虛即真汞真汞即性空其交著於內之外從此退符仍隱土釜煉之又煉存淸去濁至於虛無極是謂絶學無憂答曰不治其本難齊其末一天雷雨風雲孰得而主使之孰得而止遏之修身如執玉磨其磷琢其玷功深力積潤澤非一時非大力量不能成此朝更夕改觸發一時而氣偏於一隅又所謂玉之有玷洗之難強也子其勉之坎離之所以有乾坤之所造乾坤之所以名坎離之所化問撥動頂門關棙忽爾自合自開恁麼中不恁麼不恁麼中恁麼其意所到乎其天命之流行乎此時道眼淸明天開夀域頭頭顯露浩浩淵淵正法眼藏涅槃妙心愈活潑愈精明丹經云饒他為主我為賓是外來者為主我反為賓只是不忘照心任其點化腹陰名之為天王補心丹亦可此便是以神馭氣以氣控精之旨所謂鷹拿燕雀鶻打寒鴉其近是歟答曰婆娑妙論又問和光同塵卻不染塵世事沾他不得以其運也謂之河車以其不違天則謂之法輪其團如卵其白如練其軟如綿其輕如波其硬也鐵脊梁漢其成片也海水浸堤其不容已也揭地掀天上升為雲下降為雨電掣雷轟抽添自見漏聲滴滴元酒堪嘗種種機遇總屬一串之事所謂有物方能造化生答曰不可以形容形容則界限分矣如此玄談不可以為功總之積一寸則厚一寸積一尺則厚一尺方以象地圓以象天空不見空實不見實空實無異到處奇奇不見不了見亦無終呵呵大笑一字不通問在塵出塵答曰不止此此係初機在塵出塵仍有塵在非係無因因果一齊光停停當當春色滿溪漲此又何説於無言説中強生言説耳問動而無動靜而無靜是合一否答曰動亦無關靜亦無滯動即是靜靜卻非動動靜合一綿綿密密好個胎息問如何是綿綿密密答曰愈靜愈靜方是綿綿密密問心隨動靜為循環否答曰心不隨動靜為循環心亦隨動靜為循環無心是心焉可分別問然則無分別乎答曰分別無分別問綿綿密密是正道否答曰綿綿密密還歸不綿綿密密一步一步天台路問人一身皆屬陰即坐到澄澄湛湛的不過後天陰魄伏諸病根一勺死水一流便濁了旦夕將心撮在一處只恐觸物心驚反成心病曷若於今年初盡處明日起頭時五藴山頭一段空內討出一箇消息會得的活潑潑地不會得的只是弄精魂答曰可知者行不到可行者知不及有無相生隱顯莫測黑漫漫白茫茫變化須臾又何可擬議問沐浴答曰沐浴者滌垢之謂也逍遙兩間蕩蕩心田靈機活潑萬感皆虛噫人而天天而神之不可測妙也玄也光明者心之用空寂者心之體空寂而不光明寂非真寂空非真空鬼窟而已大道不是如斯元精已失證空無有處真是落空亡外道雲邊磨日月草裏挂行藏説甚麼海水汪洋千頃金波漾世人惑于外道鬼窟行藏亦難改矣二三子靜守吾道勿搖惑其心吾欲汝等為上乘不欲汝等歸中下流中下流非至善至善之極動靜無常神妙不測即其體也無異顯其用也無方先天而天弗違後天而奉天時神明自若也問調息是鼻息否答曰鼻息係外息色身上事心息相依方是真息般若尊者云出息不隨萬緣入息不居藴界豈是鼻也閣闢機關竅妙非一時可窺亦須力積之久一旦豁然貫徹天地不外也人為大三才並立萬化同根不在色身求自有真息見真息無息卻有息吁大泄機關矣活潑潑地至於觀息聽息亦係色身事借此攝心非真命脈真命脈還從真中求之觀聽是一事問調息作工夫答曰調息固有工夫然不一其説有外呼吸有內呼吸有凡息有神息胎息即神息非息莫胎非胎莫息胎息工夫先從息起若胎息則真人之息以踵深深矣入彀之言莫分內外卻有內外有內外者三關之謂也無內外者動靜合一也渾成一片化之謂也非化不足以語神亦非見道縱有悟境雲邊漏日光耳日月光明通天照亮非是鬼景問胎因息生在蟄藏之間是伏氣既久外息已斷止有內息而神室金胎凝結於中此等工夫皆天然造化非可強致答曰不可思議頓入不思議即此之謂也不是悍然不顧為不思議蟄藏之間胎也內息貫通三教工夫即所謂神息也即戊巳也外息何足一語功夫不到不方圓脫了梯兒又上天消息於中藏至哲靈光透出萬千千問消息是氣否答曰是氣須善養點明了諸經不肯説孔竅其門又問消息露於中宫時如何答曰一句勝是百句有權有實有照有用才有些抓著癢處便是得手之言至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地此即坎離之説問神依形生否答曰神不依形生汝將何者為神一字參透則通身泰然矣問神氣不足答曰神氣不足虧鑿已久之故善補之補足則烘然上升龍虎玄關一時頓現方知三界即吾心吾心非三界卻含三界圓通無礙諸仙佛慈光灌頂希有罕見盛世之徵太平風景不是十分卻是一分具足十分成得一分一分不了又是一分一分了時還是一分豈是寸管窺天便為得耶問五行即陰陽屬後天否答曰先天即無五行乎五行全具方有後天五行若無先天五行後天五行從何而生耶道體無形萬象森然已具古今原有先後五行生生之理實無先後問和暢是神水否答曰尚非神水神水妙用洗滌性空渣滓消融究若春風沾著便化不受牢籠空山莫袖手異味説珍羞飽飫食名心骨神水忽自流一滴歸根萬事合頭何用別慮著甚來由問戊已二土答曰一滴波中央土分戊已還無門戶又問鍊已待時答曰鍊已方可待時不鍊無時可待又問戊已二土乃先天妙用玄禪合一之學答曰先天妙用不輕得必從後天人功積人力盡而天力生方是功夫菩提路才起頭問金丹大要在於戊已二土真陰真陽真玄真牝若不得此同類而施功焉能以機而集機點化凡軀沖關透節無不賴茲大用現前一天雷雨風雲吻合造化逈非枯修可比所謂和合聚積決定成就者也答曰同類難為巧真工是實工分別眼前迹離合一齊同風雲雷雨內又誰見之莫著境且入境要箇境中境要識心內心問必大靜真空而後已土方謂之定答曰戊已有淺深徹了也是戊已不徹而徹之亦是戊已大定真空慧光普照香海觀慈雲問已土死戊土生答曰已土亦不死已土死則戊土亦不生戊生即是已活非此莫能透露又問必已土鍊到一絲不挂而後戊土發生否答曰雖然已土稍鍊足戊土即發生必得戊土生方消得已土中陰滯不然只是陰靈縱有所得鬼仙而已吾道不如是通天徹地妙用周流返魂漿未吃難將陰魄消藏爾等資質中下居多一步一步非可躐等性天見時則不拘性天不見猶如黑漆桶亂摸行蹤焉可枯禪無據便為高超上著聰明特達向誰商處處行行到底茫空有竹聲敲夜月無風難入夢魂漿水月鏡花無聲無臭萬象昭然於人間不是溪徑旁流惑世欺人也吾之道見性明心明心正所以見性三教合同圓通無滯真一分師規嚴一分非同凡流聖賢仙佛敬愼為先敬愼即是本體非有二也超凡在茲有何許多言説所言説者總是修持事層層相因疊疊不化即落凡夫界仍墮輪回苦不是上乘大羅一了百當本是一貫刻不相違剎那間成了變化即是凡夫剎那間成了變化即是仙佛仙凡聖愚之隔只一剎那間剎那剎那有何仙佛此皆道人不得已之詞也問先天氣後天氣答曰先天氣後天氣得之者常是醉阿彌陀佛安得有此極快活時節先天後天本無二致所分別者均是後天耳分別則動靜不合一先天氣亦化而為後天矣合一則後天氣亦是先天並無先後之分若有先後分別識耳分別則後天熾而念慮紛紜之所由起也莫可道莫可名者祖氣也即道之體也體立用行矣體用不分亦非黹頁頇之謂證者知之不證者仍是門外漢話問先天後天之別答曰有沾依總是後天無沾依即是先天先天何處尋要從後天尋後天情識即是先天妙用須從合符行中工夫探去合符行中即靜虛矣不過尚未淸全是渣滓渾融久久陶融渣滓不期淸而自淸金丹方得出爐問丹經朝屯暮蒙答曰朝屯暮蒙比喻之詞耳一進一退之火候轉瞬間見之何嘗必須朝用屯卦暮用蒙卦耶玄機人不懂故吾直透其旨又問交合升降顚倒答曰只是一串事一句得參通身皆活腳頭翻轉踏破乾坤逍遙無事一個道人卻有經天緯地之學倒海移山之用噫大矣哉那裏塵俗纍得心總是人心荒唐執著已見一個破天荒還有一個破天荒問夜間不得為之主何也答曰日間是識神把持夜間識神入蟄其平生所作之惡意種子未化故遇緣發生非一超直入之路一刀兩斷之功問貪嗔癡愛必須遣除方是學道答曰雖然又有説焉貪嗔癡愛即是性之用所謂情也人迷於情不知有性是為凡愚知有性而不知有情是為頑空故吾之教活潑潑不落一隅通天地合古今齊物我無𡨚親閙市裏深山淸淨場中走馬大覺金仙沒垢疵卻是大快活汚地生出蓮花彈指頓超無學千手千腳觀世音豈是尋常小論問及物窮理答曰及物窮理好然物有難窮理窮則物窮得其本領以貫萬殊可也又汝能於無分別中分別乎能於分別中無分別乎莫落邊語習氣固須除明理為上理明則習氣不期除而自除亦何須用心除用心除不得除卻費工夫及物窮理就心言強觀中即及物窮理矣不是強觀是一事窮理又是一事汝仍強觀入手便知端的心中無私坦蕩蕩神淸氣朗佛和仙只因念慮些須子鐵柱深根難脫圈故須觀照自心見方得根虛而有脫塵之想入彀之機不然者尚不知何處顚倒焉能自新新民而一貫耶稍靜片刻暫時觀心諸人觀了復云即此是叢林何處尋般若問外功答曰內功觀照外功抱一話頭或公案一則內外兼修自有靈潤周身晬面盎背之時汝只觀某不用外功而身體自壯即其榜樣也問性同情異答曰情亦無異乃習而不察流轉至今汚染而不可解究非性之過性無言説何究之有有言説亦不外性汝不聞乎水有淸濁其濕同也水淸是濕水濁獨非濕乎是淸濁異同而濕性不異汝只從一處參久則豁然貫徹矣勉之又情即是性性即是情如射箭人弓箭總是物發用只一活機有何捉摸難以懸擬弓箭射乎活機亦不離弓箭離弓箭又無活機此即色即空之喻諸人還會麼問除了精氣神方是先天答曰錯了只知淸淨無為之道未識陰陽自然之理陰陽不孤立天地離了萬物是箇甚麼亦不成其為天矣天有萬物萬物能障天絲毫否試觀眼前之景森羅並列何嘗礙得晴虛有萬物正顯其晴虛耳大道真實如是如是問參禪答曰參禪須要起疑情疑則悟不疑不悟疑情最難發得起古哲於善知識前勤侍服役多年於一言半句淡話即得大解脫者不少宗門原好但須善參不善參者則入宗門流弊俯視一切謂與諸佛頡頏其實毫無半點汝須善參汝等知釋之用功最上一乘一蹤而登雲天跛履而行千里此汝心之妄非釋之真徑也釋立言從高處引起是欲人知其極不欲人陷於影響無著之地慈悲方寸接引羣生汝以為入手功夫可以旦夕到岸無操存涵養克治琢磨恐庸俗輩到老不知自悟聖賢鄙之問虛極靜篤難能奈何答曰虛極靜篤非一時可能知靜不靜不知靜亦不靜渾水耳汝但虛得一分便得一分輕鬆快活此漸法也頓根有幾總是習染沈疴方有修行之名今而後從心田認實幻化不真何者是實從此屣去一旦踏破天關腳頭翻轉方有些箇路數又問幻化不真須絶盡方好答曰幻化不絶盡幻化為用衆草是藥材蜜和為丸是草還丹無草不能成藥無藥不能治病何可去之小人宜化不宜絶絶則禍生其理亦如之又問何為腳頭翻轉答曰化之謂也自見冰消瓦解時儒教中怡然理順渙然冰釋亦差不多不過各有力量之大小功夫之淺深見地之遲急天資之敏鈍禪宗説大事未明如喪考妣何以大事已明仍如喪考妣耶又曰大道不在靜居靜居一室反增心火之炎要行住坐臥總是功夫方得坐在千峯頂上不離十字街頭我恁麼説諸人還會也麼問智慧不足難以證道答曰何不足之有若論本體本無不足天然具足何增何減若論功夫次第則有不足不足者何朝汚夕染將一箇淸水閙得渾漿澄之不淸搖之愈濁此修行之説所由起也修者修其行行修而性亦修矣又問必得大圓鏡智方是證道答曰虛名耳無邊為大慧通為圓光明普照為鏡無私心為智非真如圓鏡一面不過如圓鏡之義耳勿執著又問識與智有何分別答曰識即是智在凡夫謂之識在仙佛謂之智淨與不淨之分耳問三際斷時後天盡否答曰不然三際雖斷後天亦不盡中道而行有許多化化生生薰陶渣滓盡淨不得化化生生也難得根識拔盡此吾之異傳即諸天尚有不知此中三昧何况淺學凡夫不在五行中何處覔真宗龍行非兔徑淺草不深隆問生機答曰生機洋溢即是大活潑非活潑不足以助道問刀圭答曰刀圭係細脈返魂漿先吃問幻化非真答曰汝知幻否知幻即離真空妙覺原不迷總是時光破碎幻相無相即得真常流注真常流注不是識心普護一法齊捐萬法彰頂上梅花步措措措別有箇仙人掌上扶藍縷窮乞食不是賣靈符吐吐吐淸淨無為是主問優遊涵養答曰優遊涵養化之謂也小有小化大有大化化之則神惟化始可以語神問先後天分別答曰後天不離先天先天即是後天同一天也雲蔽其中世人見雲則不見天吾見雲乃天也故雲不為礙問如幻薰修答曰如幻薰修輕易亦不能證得效即是功知否問何為真種答曰心空不説真種子卻即是真種子如來藏包括無限生發問海底何喻答曰海底即人心之深處也海枯終見底人死不知心極深研幾可也又問心之深處答曰深心則遠行矣遠行方於造化有窩穴有窩穴方能攺移造化有造化方能默轉天心淺者不能證地位故只説到皮毛以為極則矣遠行不動尊妙理卻難伸處處聞啼鳥山花深處行問㮙嚴經七處徵心不知何者是真心答曰即此不知者是知而無知不是無知而無知又問如何是常住真心答曰諸識不識即是常住不識中識即是智慧若起分別馳心即是輪轉而為凡矣問心之定在處答曰心無定在心若有定在可指即是妄心離妄即真汝今見吾否又問心中不得淸淨奈何答曰心中那得淸淨即在這不淸淨中尋淸淨耳及至淸淨中發出不淨相正是真淸淨才得淸淨問何者是心答曰何者非心無心即是心有心則不圓通無心則入渺茫非無心非有心有有無無之間無心是心又問真心答曰真心無形有形即歸幻妄然真心亦非無形不泥於形而實形形形色天性聖賢學問同之又問真心從心源覔否答曰源頭淨則天理現前日用行常不礙至道源頭不淨縱有所見猶如風燈零亂焉是真常汝等莫將真心喚作妄心看所謂真心者光光淨淨之心故能通天徹地而無絲毫之偽並非攙和銅鉛雲邊見月即為得手即此見精從何處覔覔則不得道在眼前人不識空把鋤頭仔細瞧問真空妙有答曰心空不空謂之真空心有不有謂之妙有勿滯一偏方入中道而有入德之基問某所見甚淺求指引入心之深處答曰亦不淺心地門頭深深淺淺亦不一致耳一樣話深者見深淺者言淺圓見圓機故無有定然淺者深攀亦學者所應勉力深處現在未離因見有異故有淺深之説可以一網打盡當下見了本來那裏有深淺層次之可尋高下厚薄之可探不悟者又難言若照吾如此説又是增上慢人一斤斗説到西天矣問如何能不挂一絲答曰本不挂一絲不挂一絲精之極矣精極明堅已入果地矣非可易視又曰渣滓消磨見聞通鄰止一精真菩提之境淨極明堅烈焰騰空照徹無極世界那得能彀問人空答曰定性聲聞不是禪卻是禪中第一天只要精凝光透白方知流逸是何人得了人上得乘未得人莫説化乘乘説甚麼人空空人問究竟是一無字答曰不可以有無言由淺入深次第為之其理無二功夫層次卻有區別有箇到家的無有箇不到家的無善參之問金色同否答曰金色足是同分量原有不一小歸小神大歸大神各因各果有半途而去者亦入神道仙道各隨其功力之淺深非一定也問金翁何喻答曰金翁即識神自性自度自度即化識即金翁又問金即真精否答曰純一不雜之謂非世間之金虛得一分即足得一分足則生華金出爐矣然還須煅鍊愈鍊愈精愈精愈明久則化識神為佛慧香海慈雲阿彌陀佛問三關答曰三關是一關並無先後上下可分若分別則有定所不是常寂光也常寂光如指南針東西南北不轉移卻是斗柄雲橫鼓打更深咚咚響閃光鑠處不由人驚得夢魂更又問何為上宫答曰上宫無宫是宫三關雖無次第可分然功力之證亦有三關之別打通列上功位尊爵又崇普雨天花落究竟一空空一空空用不窮性中得命是真功何嘗人力濃行深般若自見奇隆奇隆不隆卻是虎龍境中有境説甚通通不假一毫功卻是天然錦繡同了卻吾生還把顚來倒去公共陽氣濳藏要出谷一聲霹𩆝靜中聞電光爍處尋真種功上加功是大文又曰道德五千言陰符三百字何嘗有一句在皮毛上講究後人妄以傳妄迷失本來性真不求自已命本元辰以致有燒茅弄火之流運氣搬精之輩即調息數息亦不過後世設法藉此攝心耳問積纍既久則金光外現答曰內外者玄關立而後見不玄關猶如水火煮空鐺事事無著落玄關徹天心見不是黑窟生涯鬼面問經言庚方月現是否喻其明之微而未全吐也答是問心之昭昭靈靈者道家以之作金針為主腦釋家因其是輪回根本而謂之淨業答看問如何是定答曰心無定見精凝為定指南針兒不用拿隨我東西撥轉他幻出世情無異味仍是當年一枝花花花花果結在花家花中不見果正是果位誇因果交徹理即此是仙家佛道原無二只因世見差歸我淸淨德瑩然不生花問通身是手眼答曰手眼為活參活句莫參死句死句無活活亦非句問光明須消滅否答曰光不可消滅日月光明普共何嘗著得分毫道人心性一齊拋世事原來顚倒半虛半實空中妙半有半無自在好半是無言半有言其中大用細尋討了了了尺地延生半天雲曉靈機難到手到手者非大德莫能擔荷靈機到手鬼神莫測其由來何况人乎問靜中坐出端倪是何意旨答曰誰家玉匣開新鏡露出淸光些子兒一破不迷任你口似懸河我只一以貫之問回光返照乃生死海中之渡筏玉液鍊形即舉水制火之妙喻至於人心之覺其體一而其用二有昏覺之覺有自然之覺昏時之覺如電光之一瞬若耳目之視聽焉自然之覺如聲之自入耳物之自接目無為而無不為無在而無不在念慮一起神目昭然易曰知幾其神乎莫知所從來常應常靜是否即所謂無位真人最上一乘也答曰所喻是仍須心印問行氣主宰即眼是也眼為陽竅道在眼前雖能視能聽而實超乎動靜是人心之常處也非銷識莫能眼明非眼明莫能銷識是否答曰大得參透一關一關打破又一關關有次第刪不粘不滯為尚以柔以默為強臥聽鐘聲行趨佛路又問眼是真心否答曰不是幻光也藉以逐陰邪行氣主宰若即以之為妙竅若即以之為至寶則知淺不知深矣問蒙示浩浩落落瀟瀟灑灑一腔熱血大地不腥羶烈火燒金蓮和盤托出錢步步是先天不著後天緣等句敬參大地山河皆吾法身五濁惡世皆是淸淨道場慈悲而慧一氣流行運用自然得意生身和盤托出先天元性厯劫不壞之慧命如金錢之灑落答曰須驗方知此處落機深而又深極之無極蒼茫古道少行人片語同時大地春婆娑世界都包許説甚黃昏靜掩門問耳根音聞入門答曰耳根淸淨大士圓通法門爾從此證入即得聞薰聞修方知如幻三昧即一毗盧性海矣乾元面目不外於茲六根淸淨一精真妙須回向真如寂體是寂用是照寂照方名一須知寂照雙融非大定不能寂而照照而寂寂照本空空卻是寂照寂寂寂寂還歸無寂寂方是真寂寂真寂寂卻不寂即是寂寂無可寂是真寂那管那照寂寂照寂禪理要深攀玄理不易迹道在目前目前卻難明人好奇喜新錯過目前不知何處是道道也者當下即是昧了當下即是心馳意走念念不由人皆因神力淺神力淺皆由心馳日月行藏實是至道淡淡乎天之根冥冥乎元之始幾幾乎道之危神神乎光之赫日就月將討得真消息消息在平洋不是靜中藏卻要靜中藏得問妙理難參答曰難參者何頂相難睹耳又問何得轉關答曰一句轉關只在根下磨勘磨得斷兩頭空空中方見祖和宗的的證圓通萬行莊嚴正是菩提之妙用一靈光耀卻是仙道之無常脫卻牢籠超世界東方寶月照山河適從華山過頭陀總不知佛力原無限道釋不同過噫嘻乎鬼神知察分明而難料吾心不動處也今而後吾知一矣不知其二惟其無知所以無不知無不知卻無知照此參解不難取證異時濃香異葩觸處薰淨噫得大自在感激師恩指示得臻如此受用先靈萃聚克盡孝道天心回思塵寰中事如夢中又夢哀憫衆生興大悲心衆生同在大覺中竟昧然不悟故亦不輕衆生因衆生與聖無異只在一轉念間耳問何為先天答曰心即先天先天者對後天而言之也對待之説心絶對待方是真常而不拒諸相發揮楞嚴經已明言之矣又問心絶對待即無極之謂歟答曰無極者真空有極者妙理無極即有極非有極之外又有無極也範圍天地而不過曲成萬物而不遺樞紐陰陽色色歸根如此妙極只是不見此乃天地之先鴻濛未判以前之説然即混沌以後之事無分先後卻有分不是難憑一味吟識得箇中顚倒用心同黃土變成金如此説先天是先天無可言矣然又有有言之先天有言之先天何也聖凡之分矣聖即是先天凡即是後天於此先後天俱名為後天不得謂之先天先天者何無形是也然無形亦不獨立憑有形者證有形為無形之用無形為有形之體即此有形又是無形此即動靜合一之妙方是真空妙有之真空正説法天花落下繽紛希有罕遇好希奇卻也是古佛禪機問憑依修持法答曰莫憑依無倚依見真心真心不是無依倚卻是毗盧頂上行老禪客作家僧卻也難得只在一心並無剩法未了義問何謂神通答曰妙應萬物之謂神無在而無不在之謂通問報身答曰報身無報亦強名耳圓滿之謂也若真有報身即是二見矣二而不一一亦無一是真一寂照不二一又問法身答曰法身義所以聚積諸法而卻不能著得語言問心有名乎答曰心無名即道亦強名大道出於象數名言之外何可名得問生死答曰分假生死化作變易生死仍有生死且將這分假生死不分假變易而輪回短空空無有問我説行蹤飄飄一葉風仙去若無蹤又問何謂無生答曰生而無生故曰無生無生還有一曲汝唱一箇無生曲世間聽才是無生問感召答曰有得太陰精有得太陽精者其實還是一箇不過各人根器太上堂堂大道不外日用常行何嘗是鬼窟生涯有一等人將色身算作法身求之氣運上升以為結胎産嬰兒張本自高自足不知大道沙裏淘金金烏飛入蟾窟皆是未生前事見淺者焉能窺其堂奧説有執有説空滯空不識大道淵源先從淵源探摸的見空劫以前自己方知神龍變化夫唱婦隨之理何嘗執有亦不執空妙有真空真空妙有現於一毫端小大相融一多無礙方説得鼎爐中事超生受生一目了然不是那些話説吾教各盡其業素位而行胸懷磊落光明做得人世間頂天立地奇男子盡孝純忠大丈夫方不枉人世一遭垂千古而不朽心中瀟灑即是仙心中無纍即是佛心中無私即是聖保全汝良知良能各人有的並非外求更不在肉身計較死後一壞黃土儘彀汝埋賢愚同歸富貴一致那些是我惟我這一點靈明秋空月皎寶鏡澄輝烈火騰騰好種蓮西方路上是金仙不用妄求除念妄香花果實一齊鮮請七日閉關專辦道功答曰吾汲汲遑遑周流四海勸善化惡消其黑氛上沖引其光明善氣故吾設教如大海水各隨器量取七日是良宵盛事人生有幾得遇其會吾所為何事豈不大願即於某日起可也起七請功答曰行住坐臥提醒此心常令不昧無時刻之間功即接續不斷亦不必拘拘坐時參不坐時便不參然坐必以律亦事之當然坐三刻行一刻飲食按時冷暖自護有事照常辦事正於辦事中即是用功處總要念念從何來念從何去看破這窩窟賊巢方得大蹈步直上瑤天其餘肉身上功一概不必吾此道肉身功在其中一通百通山河大地總是吾身些須心肝五臟穢物有何辦頭吾今日亦發憤啓迪只要爾等福緣承當得起親驗親證將這些旁門左道一概為吾闢卻大道是甚的性命是甚的説那裏話至於一切四威儀中照律行持均可參語廣多姑拈一則因緣如何是牛吃草草吃牛如何是有無不二如何是分開動靜又如何是色空俱遣遣後還有色空否參極高處摸不著極下處飄不起奈何厯盡蒲團三十載算來還是一金翁淸淨為宗光明為用大震雷霆顯我玄功妙道無邊人心是極水天一色月照潭空曠落中感召神奇悠然間自存不息伏處未著力起處空寂寂靑雲路蓬島居一壺一杓自在間娛風飄飄其無聲水洋洋其無痕此中玄妙理無事且沈吟淸白中有把柄混沌時有歸宿月淡星稀爐煙縹眇萬神齊唱太平年正是中天景運鮮天雲無二唱靑蓮雲不遮天雲亦由天天下事事在人為卻也須暗中默運二氣流行莫非鬼神之昭著蒼蒼者天赫赫者日月不可欺掩如是夫塵淨鑑空萬物全歸一己寶明覺性大千顯露真常淨業不同染業説來凡聖齊捐空空洞洞大光天活活仙人出現人之生也抱氣於渾涵之中而生質及其覺也而陰陽己分嗜欲紛華吉凶悔吝茫不自知逮陰陽大判元氣不可復繼之以亡而已矣其氣是天地之氣非爾我得以私之其中有理存焉善者善之惡者惡之墮惡趣落異類其魄之歸其魂之散其感之薄其遇之值皆非一類觀也而其大端禾不生黍鳳不乳馬各有不同看人之趨向何如耳天質愚智不同而其所賦之性有異乎不肖者不及何智者又過之此其中道之不明一也賢者較愚者迥別殊不知賢者未登其實不如愚者各自思之可也吾自設教以來高高下下不一其致總鑒其人之誠信與否又有感召不同趨向不一吾來此大有因緣忙忙踏遍四海九州正欲於今日垂示梯航知吾教是正大光明並非鬼魊行藏闢邪説正人心統歸於中和善氣亦非拘拘令人如籠中鳥又非旁門外道枯禪苦節廢時失業以為自高不知大道堂堂日月常行均皆至道時當顯也即纓絡莊嚴彌綸世界亦不為奢時當儉也即一爐一几二三子誠敬侍側亦不為省豐儉隨時調和得中還須放開眼界勿泥目前堂堂男兒漢幃幄千丈光逢時遇節禮拜裝香正是道律禪儀只因諸子性分中事與吾一炷香脈絡相承並非道人好飾儀文而諸子誠意所通即世間物亦蓬萊景矣淸風兩袖一任雲飄諸子少興趣道人樂陶陶有甚牢籠淸光灼灼萬境齊拋紅黃相間雜淨水一杯消簾捲西風銀桂香飄紅酒醽醁豪高不許間人門兒敲説與知音秋容淡蕩好一尊古佛顯慈航渡得乾坤大地忙萬象普觀無二致心心念念説花黃靜夜鐘聲敲古寺風花雪月一爐香吾道宏深非如俗眼止目為仙絶人逃世棲處岩谷以為自得了手間人消受天地風花雪月之報説妙談玄周遊蓬島不乏其仙吾之道不如是也代天抒化普度賢愚同歸聖果至善並非小溪小徑故爾等須倍加敬愼乘此天恩得獲良益雖得益者淺深不同各隨器量因果無不具足道人全脈在此顯化昭靈以為後世及秉教向道諸人知吾道是參贊化育之道並非自了旁門諸子既奉吾教亦各發願立心成已成物成物正所以自成自成非成物不可諸人靜心聽吾言九曲黃河天隘險總是人心現大地本無偏坦坦平平渡得江河堰道人化迹九州顯遍掌乾坤日月巔靑鋒劍挂在肩頭尋遍人間惡善幾箇兒孫相推託老父母反覺贅疣厭兄和弟心下相多各存一箇顏面不知本來淸淨不淸淨一味胡厮命該淸淨生來即淸淨矣命不該淸淨縱或強除枝葉亦不過是脫胎入胎反遺下許多孽債又重增一種公案依舊不了緣添了煩惱怨總是肉眼凡夫止顧目前受用不計天理昭彰疏而不漏幾見箇後人發越不從孝悌陰隲中來吾下塵凡久久總不過勸人安命安命則命有了時不淸淨者自得淸淨一派和靄風暗中鬼神解頤吉神擁護久久難化為氣莫知何以然左右逢源災消福增不然則眼前視為得計其實暗增黑氛氣化為難而不覺亦莫知何以然日見消阻精神頽敗鬼神奪其魄智識不如人頭頭走不著不識自已愆尤由漸而積反怨天無天理人無顧濟此等凶愚實堪痛恨又可憐憫故吾下界普濟衆生規引善果善者善之惡者惡之鑒觀有赫絲毫不爽大善有大果小善有小果各因各果亦莫知何以然而然諸子其敬聆之常目在茲克明峻德聖賢學問不異玄禪乃世人不察三教異同紛紛立論真是醉夢中狂解跑馬看花真堪一笑而留心斯道者又犯喜靜惡動之弊人人不免不知強離𡨚牽依舊不了緣縱或絶人逃世深入山林而山中虎豹豺狼魍魎魑魅暴雷烈風令人心驚神顫況乎血肉之軀衣食供給在在需人稍失調護寒暑浸霪遽成苦惱病痛臨時不悟走入旁蹊反悔學道毫無益處適足害人又有一等志慕山林不顧時事之行藏宜否一味塵離詭異怪行以為别於流俗不知廢時失業以致事體缺欠精神日漸頽敗道亦莫能解悟不識自已起足走入旁蹊反言為善不昌道不可學此等荒談真堪大笑加之邪師僻友紊亂道宗毫釐千里沽名釣譽實為吾道害噫今日得二三子奮志向上參妙透玄為吾門寶而學道之錮弊以致人事灰頽皆由自入旁門究竟善心起念深堪憐憫若能於人事中修之則更勝於山林吾道流傳下去總是人事中修持不喜深山鬼窟逃世絶人作自了漢吾之得與天地同其悠久者因體天地好生之心爾等如果發願隨力隨才無損於已有益於人既有益於人亦不能不損於巳然損於巳無全損之理若全損人得之亦不能消受除非大義所在或往因夙償否則不必不過隨時隨事勉力而行只要的當無咎轉禍為福即是吉星即是吾門抒化大弟子他日冥冥受報得握人間禍福柄不亞吾也吾意亦非浪施須要善會即一言一行有益於人總是抒化之一端耳凡人終日間時儘多忙時甚少如爾等在此止此一事過此便萬緒千端其實行住坐臥總是一事人自忙耳故吾前云只是當下不昧即心不馳而意不走省下許多工夫腳踏實地隨遇而安也不妄想也不學道即此便是大道學久則神凝氣聚渾合無間神力綿綿方消得魔障出得牢籠上得天空一步一步崇人情冷暖世事變幻頗難預料均無一定花開時人玩賞花落時一堆潦草要撮得去掃得淨方是佳時共好諸子既皈吾教勿貪勢利樹倒藤枯好一堆爛柴不可不知塵俗念須要勾了何必嘮叨置心田而不放學道之士正欲於葛藤扯絆中方見經綸妙手不然何為奇才庸俗而巳順境誰不會過只到逆境略加怨天尤人之心不免殊不知平素有何功德消受天地生養之報還自思量否今而後諸子放下心鍊成靈寶人難識消盡陰魔鬼莫侵只須當陽一露百句話頭有何排遣不下有何隔礙本體空空不離萬象中包函萬象消萬象即此一語出牢籠問習靜答曰試問足下何時靜何地靜若欲此身安是養生小術為天地人所忌所謂偷懶輩也烏得謂之學不得謂之道道化者廣大高明隨時隨處而無不通其流行也其化育也道以生道而變化出焉乃修道者動欲離塵去俗殊不知和其光同其塵何謂也天以天地以地人以人未離乎人寧可遠人況道不遠人日用常行無非道也道在天地而為天地道在人而為人存神知化道豈遠於人耶問人有利鈍之分教有立言之異如天資明健本體透露明足以察其機健足以致其決工夫自歸於易簡原不妨徑趨佛路一超直入如來地如本體昏蔽則是致虛之功未致致虛即集義也適合其宜之謂義適合其宜即是人心恰好處恰好處即中也答曰人心昏蔽亦有鑒照不過困知生知省力費力之别惟照方能致虛到恰好處巳無安排矣言教亦有不實不盡總是應病用藥若各經各典拘拘一箇道理只要一部足矣又何必嘮嘮叨叨做下許多樺頁有對大菩薩説者有標指者有為愚夫立方便者有賢愚共賞者如太上道德經天機渾成純朴歸元之作故千古不磨乃太和元氣大道從此昭著心經由此開宗為萬世梯航顯於言表而隱文奧義實非尋常各家注亦止注得皮毛仁者見仁智者見智百姓日用不知故君子道鮮矣一箇人可以為善可以為惡或先善而後惡或先惡而後善總無定評故吾不輕許人亦不輕慢人安知後來不如今耶禮斗科儀吾教甚重恭敬其心萬法來朝禮一朝勝如坐七一日今且禮心上之斗可也謹按學者問言多未中綮帝師答語妙己入深金針盡度矣惜尚未悟在讀者知此自不辜負慈心並以告天仙嗣派者廣化子惠覺又志
