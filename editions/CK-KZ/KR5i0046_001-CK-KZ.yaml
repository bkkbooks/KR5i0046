body:
  text: 金華宗旨目錄天心第一元神識神第二回光守中第三回光調息第四回光差謬第五回光證驗第六回光活法第七逍遙訣第八百日立基第九性光識光第十坎離交媾第十一周天第十二勸世歌第十三金華闡幽問答金華宗旨題詞往古來今只此一道名之爲金華道之因也就其初功言之也名之爲金丹道之果也就其成功言之也總一天仙訣也而曰宗旨云者則澈上澈下澈始澈終會而通之直而示之若曰吾天仙之法如是焉而已我孚佑帝師昔立天仙派卽此二字具見普濟慈心金針己度千百年來高高下下成大成小各各不同而或以訓煉或以接引亦總皆天仙中人而不必卽足以當天仙之派何也我帝師等觀音之願海垂妙道於一乘必眞有自度度人心且立共化化人願由入門以洎得路直從落地說到上天將厯厯相傳之心法原原本本眞眞實實洞然於心目間而復以之訓迪後人使源源相接乃可授派而引之以入聖域某仰沐慈悲無量幸得心傳今奉命總輯全書因畧說端倪如是從兹以來天仙之派千支萬滙源遠流長共由覺路以達靑霄是則某之愿也夫某之愿也夫宏教弟子柳守元熏沐題詞
  hash: sha256:e505e766a665a93f1abaedebb4cbc089846295d56e9ba7f56f195c97c730cd49
