front:
  text: 金華宗旨後跋陰符三百字道德五千言何嘗有一語在色身講論乃後世言長生之術者無不錯認乾坤坎離諸名色着相求之又執有爲屬命無爲屬性之說配合身心身爲外丹心爲内丹是將性命看成兩橛矣金華宗旨許旌陽眞君謂爲四字天經卽所謂淨明道法忠孝雷霆也源流載之悉詳此教外別傳之旨言性而命在其中言命而性在其中斗中孝悌王序云離六塵無見性之地舍六根無立命之基知六塵是本根則滴滴歸源知六根皆光明藏則處處靈通數語足盡其妙尙何容贊一詞所惜者萬善子旣已補入全書又云出言似非正大字句涉於舛錯者悉皆刪易之審此恐非全璧通幸沾法乳授太乙金華祕奥又侍演金華闡幽修輯全書宗正同受者亦符七人之數因將宗旨一一請證畧加刪訂一燈復繼千室共明其賴此超凡入聖者將無所終極焉嗣派弟子通宵謹識金華宗旨後跋憶昔余小子元奉教於易菴先生之門先生授以淨明忠孝錄一册曰此旌陽眞君四字天經眞君從諶母受斗中孝悌王之傳以儒證道以道振儒化度弟子多儒流惇敘人倫服勤官政志節卓然間出而斬除妖魅拯救生靈無非本性地之光明爲濟世之勳業卽錄中所謂淨明道法忠孝雷霆者也小子敬奉而讀之他日呂祖命易菴先生以下七人傳示宗旨其鑒證者王天君也是日萬靈萃止八景浮空七人拜而授教直接斗中孝悌王之眞傳卽太乙金華宗旨也其初授也不落言詮絕無文字直指羲皇畫前之易根於無妙於有自一本而萬殊由萬殊而一本亘古亘今貞恆不變其金華之謂乎嗣後發揮宗旨動靜無端陰陽無始其流行於日用則六位時成卽今日影輝窗拈毫呵凍凝神定慮敬述緣起無非由朝乾夕惕之本懷爲或潛或見之面目盛德大業不離現前卽現前爲本體卽本體是工夫神矣哉眞金華遞傳之嫡血也迄今厯二十餘年孝悌王又重提舊時宗旨元卽授同學張子爽菴訂輯書成復蒙列祖各序簡端命元述緣起一大事因緣時節豈偶然哉元等昔以七人受教於祖今派下諸同學又適符七人之數益信道緣之不可思議也自今以往傳示無窮化度無量卽邵子所謂我不得而知之聖人亦不得而知之者耶金華嗣派弟子宇菴屠乾元敬題
