body:
  text: 按此經於康熙戊申蒙孚佑上帝垂示人間其時受法弟子爲潘易菴屠宇菴莊惺菴莊誠菴周埜鶴劉度菴許深菴七人至壬申𡻕復提唱宗旨時又有張爽菴李時菴馮返菴馮近菴許凝菴潘眞菴潘卓菴亦適符七人之數乾隆乙未錢塘邵志琳得蘇門吳氏抄本自加訂定刊入全書宗正今屆重訂之期廣化子復釐定之歸入集中而囑予詳誌前此諸人姓氏爰臚列之俾不致湮沒云爾正化子法嗣恩洪謹識金華宗旨後跋金華之義何昉乎嘗觀魏伯陽眞人參同契曰太陽流珠嘗欲去人卒得金華轉而相因我孚佑帝師亦嘗於玄妙觀題蕉云美金華要十分開金華之見於經典者甚多而唯此二則最關道妙金華之關於道妙者固鉅而深得宗旨則爲尤鮮此非天仙之傳不足以明之更非天仙道祖不克以示茲妙典也此經由孚佑上帝特傳於世繪水繪聲拈花拈影於毫端許現寶王刹坐微塵裡轉大法輪眞照世之炬燭濟海之慈航也因思孚佑帝師名天仙派必有留傳字句詢之惠覺蒙敬述云昔聞有二十字曰寂然無一物妙合於先天元陽復本位獨步玉京仙并吿小子志秋曰十字著眼二十字著眼子不觀夫世之傳派者每多遞及而止乎殆庸有盡也天仙之派萬古不磨故以終爲始是統始終而無始卽無終焉抑不觀夫世之傳派者每以人實其額乎爲其有數也天仙之派萬源不竭故從今溯古不分古今而無古自無今焉我孚佑帝師天仙之始祖也宏教恩師天仙之二祖也子其敬誌之小子叨跋是經謹詳識巓末俾後之讀此宗旨者皆知金華之妙其亦天仙派中人也耶待濟弟子志秋謹跋
